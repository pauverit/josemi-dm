<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Calculadora Coste Impresión PRO</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root{
--bg:#f1f5f9;
--card:#ffffff;
--primary:#2563eb;
--green:#16a34a;
--orange:#f59e0b;
--red:#dc2626;
--text:#0f172a;
--muted:#64748b;
}

body{
margin:0;
font-family:system-ui,-apple-system,BlinkMacSystemFont;
background:var(--bg);
color:var(--text);
}

.wrapper{
display:grid;
grid-template-columns: 420px 1fr;
gap:20px;
padding:20px;
}

.panel{
background:var(--card);
padding:20px;
border-radius:12px;
box-shadow:0 4px 18px rgba(0,0,0,0.06);
}

h2{
margin-top:0;
}

input, select{
width:100%;
padding:8px;
margin-top:4px;
margin-bottom:12px;
border-radius:8px;
border:1px solid #e2e8f0;
}

button{
background:var(--primary);
color:white;
border:none;
padding:10px;
border-radius:8px;
cursor:pointer;
width:100%;
font-weight:600;
}

.result-card{
background:var(--card);
padding:20px;
border-radius:12px;
box-shadow:0 4px 18px rgba(0,0,0,0.06);
}

.bar{
height:8px;
background:#e2e8f0;
border-radius:6px;
overflow:hidden;
margin-bottom:6px;
}

.fill{
height:100%;
background:var(--primary);
}

.heatmap{
margin-top:15px;
border-radius:8px;
overflow:hidden;
}

.small{
font-size:13px;
color:var(--muted);
}

.tac{
font-weight:700;
font-size:20px;
}

</style>
</head>

<body>

<div class="wrapper">

<div class="panel">
<h2>Datos de impresión</h2>

<label>Ancho (cm)</label>
<input type="number" id="w" value="100">

<label>Alto (cm)</label>
<input type="number" id="h" value="100">

<label>Copias</label>
<input type="number" id="copies" value="1">

<label>Precio tinta €/litro</label>
<input type="number" id="inkPrice" value="55">

<label>Precio material €/m²</label>
<input type="number" id="matPrice" value="1.8">

<label>Desperdicio tinta (%)</label>
<input type="number" id="waste" value="8">

<label>Impresora</label>
<select id="printer">
<option value="1.0">HP Latex 700</option>
<option value="1.1">HP Latex 800</option>
<option value="0.9">EcoSolvente</option>
<option value="0.8">UV</option>
</select>

<label>Modo Calidad</label>
<select id="quality">
<option value="0.8">Draft</option>
<option value="1.0" selected>Production</option>
<option value="1.3">High Quality</option>
</select>

<label>Subir imagen</label>
<input type="file" id="file">

<button onclick="calc()">Calcular</button>

</div>

<div class="result-card">
<h2>Resultado</h2>

<div id="tacDisplay" class="tac">TAC: 0%</div>

<div id="bars"></div>

<div class="small">Consumo total tinta</div>
<div id="inkTotal"></div>

<div class="small">Consumo por m²</div>
<div id="inkM2"></div>

<div class="small">Coste total</div>
<div id="totalCost" style="font-size:22px;font-weight:700;"></div>

<canvas id="heatmap" width="400" height="300" class="heatmap"></canvas>

</div>

</div>

<script>

let currentCMYK={c:30,m:20,y:25,k:15};
const cache=new Map();

document.getElementById("file").addEventListener("change",e=>{
const file=e.target.files[0];
if(!file)return;

if(cache.has(file.name)){
currentCMYK=cache.get(file.name);
return;
}

const img=new Image();
const url=URL.createObjectURL(file);

img.onload=()=>{
const canvas=document.createElement("canvas");
const ctx=canvas.getContext("2d");
canvas.width=img.width;
canvas.height=img.height;
ctx.drawImage(img,0,0);

const data=ctx.getImageData(0,0,canvas.width,canvas.height).data;

let sC=0,sM=0,sY=0,sK=0,n=0;

for(let i=0;i<data.length;i+=16){
const r=data[i]/255,g=data[i+1]/255,b=data[i+2]/255;
const k=1-Math.max(r,g,b);
const inv=1-k;
sC+=inv?((1-r-k)/inv):0;
sM+=inv?((1-g-k)/inv):0;
sY+=inv?((1-b-k)/inv):0;
sK+=k;
n++;
}

currentCMYK={
c:(sC/n)*100,
m:(sM/n)*100,
y:(sY/n)*100,
k:(sK/n)*100
};

cache.set(file.name,currentCMYK);
URL.revokeObjectURL(url);
drawHeatmap(canvas);
};
img.src=url;
});

function drawHeatmap(sourceCanvas){
const heat=document.getElementById("heatmap");
const hctx=heat.getContext("2d");
heat.width=sourceCanvas.width/4;
heat.height=sourceCanvas.height/4;
hctx.drawImage(sourceCanvas,0,0,heat.width,heat.height);

const imgData=hctx.getImageData(0,0,heat.width,heat.height);
const d=imgData.data;

for(let i=0;i<d.length;i+=4){
const brightness=(d[i]+d[i+1]+d[i+2])/3;
const intensity=255-brightness;
d[i]=intensity;
d[i+1]=0;
d[i+2]=0;
}

hctx.putImageData(imgData,0,0);
}

function calc(){

const W=document.getElementById("w").value/100;
const H=document.getElementById("h").value/100;
const copies=document.getElementById("copies").value;

const area=W*H*copies;

const inkFactor=
parseFloat(document.getElementById("printer").value)*
parseFloat(document.getElementById("quality").value);

const waste=parseFloat(document.getElementById("waste").value)/100;

let mlC=area*(currentCMYK.c/100)*inkFactor;
let mlM=area*(currentCMYK.m/100)*inkFactor;
let mlY=area*(currentCMYK.y/100)*inkFactor;
let mlK=area*(currentCMYK.k/100)*inkFactor;

let mlTotal=(mlC+mlM+mlY+mlK)*(1+waste);

const tac=currentCMYK.c+currentCMYK.m+currentCMYK.y+currentCMYK.k;

const tacEl=document.getElementById("tacDisplay");
tacEl.innerText="TAC: "+tac.toFixed(1)+"%";
tacEl.style.color=
tac<200?"var(--green)":
tac<300?"var(--orange)":
"var(--red)";

document.getElementById("bars").innerHTML=`
C ${currentCMYK.c.toFixed(1)}%
<div class="bar"><div class="fill" style="width:${currentCMYK.c}%"></div></div>
M ${currentCMYK.m.toFixed(1)}%
<div class="bar"><div class="fill" style="width:${currentCMYK.m}%"></div></div>
Y ${currentCMYK.y.toFixed(1)}%
<div class="bar"><div class="fill" style="width:${currentCMYK.y}%"></div></div>
K ${currentCMYK.k.toFixed(1)}%
<div class="bar"><div class="fill" style="width:${currentCMYK.k}%"></div></div>
`;

document.getElementById("inkTotal").innerText=
mlTotal.toFixed(2)+" ml";

document.getElementById("inkM2").innerText=
(mlTotal/area).toFixed(2)+" ml/m²";

const inkPrice=document.getElementById("inkPrice").value;
const matPrice=document.getElementById("matPrice").value;

const inkCost=(mlTotal/1000)*inkPrice;
const matCost=area*matPrice;

const total=inkCost+matCost;

document.getElementById("totalCost").innerText=
total.toFixed(2)+" €";

}

</script>

</body>
</html>
